name: Deploy to EC2 (Docker)

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            # Docker 설치 확인 및 설치
            if ! command -v docker &> /dev/null; then
              echo "Docker 미설치 - 설치 시작"
              sudo dnf update -y
              sudo dnf install -y docker
              sudo systemctl start docker
              sudo systemctl enable docker
              sudo usermod -aG docker $USER
            fi

            cd ~/loanapiserver/app10
            # 코드 최신화 (Private 레포 인증)
            git pull https://${{ secrets.GIT_TOKEN }}@github.com/zelratole/loanapiserver.git main
            # Docker 이미지 빌드
            sudo docker build -t loan-api-server .

            # 기존 컨테이너 중지 및 삭제
            sudo docker stop loan-api || true
            sudo docker rm loan-api || true

            fuser -k 8000/tcp || true
            sleep 2
            # 새 컨테이너 실행
            sudo docker run -d --name loan-api -p 8000:8000 loan-api-server