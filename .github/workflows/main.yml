name: Deploy FastAPI to EC2 (Non-Docker)

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            # 1. EC2 서버의 프로젝트 최상위 폴더로 이동
            cd ~/loanapiserver
            
            # 2. GitHub 최신 코드로 강제 덮어쓰기 (Git 충돌 에러 원천 차단)
            git fetch --all
            git reset --hard origin/main
            
            # 3. Miniconda 환경 활성화 (환경 이름이 mlops인 경우)
            source ~/miniconda3/etc/profile.d/conda.sh
            conda activate mlops
            
            # 4. 패키지 설치 (현재 위치인 루트 폴더에 requirements.txt가 있음)
            pip install --no-cache-dir -r requirements.txt
            
            # 5. 기존에 실행 중인 Uvicorn 서버 종료 (8000포트 확보)
            fuser -k 8000/tcp || true
            sleep 2
            
            # 6. main.py가 있는 폴더로 이동 (가장 중요한 부분)
            cd app10
            
            # 7. 서버 백그라운드 실행 및 로그 저장 (0.0.0.0 외부 접속 허용)
            # 로그 파일은 루트 경로(~)에 loan-api.log 로 저장되도록 설정했습니다.
            uvicorn main:app --host 0.0.0.0 --port 8000 > ~/loan-api.log 2>&1 &
